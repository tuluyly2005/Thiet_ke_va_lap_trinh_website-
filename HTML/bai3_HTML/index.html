<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngày 3 học lập trình website </title>
</head>
<body>
    
    <h2> FORM ĐĂNG KÝ SINH VIÊN</h2>
<table>
    <tr>
        <td>Họ và tên:</td>
        <td><input type="text"required></td>
    </tr>

    <tr>
        <td>Mã sinh viên:</td>
        <td><input type="number"required></td>
    </tr>

    <tr>
        <td>Email:</td>
        <td><input type="email"required></td>
    </tr>
    <tr>
        <td>Mật khẩu:</td>
        <td><input type="password"required></td>
    </tr>

    <tr>
        <td>Ngày sinh:</td>
        <td><input type="date"required></td>
    </tr>
</table>

     <h3> Giới tính</h3>
     <label>
     <input type="radio" name="gender"> Nam <br>
     <input type="radio" name="gender"> Nữ <br>
     </label>

     <h3> Sở thích</h3>
     <label>
     <input type="checkbox"> Đọc sách <br>

     <input type="checkbox"> Nghe nhạc <br>

     <input type="checkbox"> Chơi game <br>
     </label>

     <h3> Ngành học</h3>
     <select >
        <option selected disabled>----Chọn ngành học------</option>
        <option> Công nghệ thông tin</option>
        <option> Thiết kế đồ họa</option>
        <option> Điện, điện tử</option>
        <option> Kinh tế</option>
        <option>Marketing</option>
     </select> 
   

     <h3> Giới thiệu bản thân</h3>
     <textarea rows="5" cols="40" placeholder="Giới thiệu đôi nét về bản thân"></textarea> <br>
     <button type="submit">Gửi</button>
     &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
     <button type="reset"> Làm lại</button>

     <hr>
     <p> <i> Cảm ơn bạn đã đăng ký</i></p>
    



</body>
</html>
